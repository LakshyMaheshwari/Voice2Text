<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Meeting Assistant</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">

    <!-- ── Auth View ──────────────────────────────────────────────────────── -->
    <div id="auth-view" class="view active">
      <div class="logo-section">
        <div class="logo-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#667eea"/>
                <stop offset="100%" stop-color="#764ba2"/>
              </linearGradient>
            </defs>
            <rect width="40" height="40" rx="12" fill="url(#logo-grad)"/>
            <path d="M20 10c-2.2 0-4 1.8-4 4v6c0 2.2 1.8 4 4 4s4-1.8 4-4v-6c0-2.2-1.8-4-4-4z" fill="white"/>
            <path d="M28 18v2c0 4.4-3.6 8-8 8s-8-3.6-8-8v-2h-2v2c0 5.1 3.8 9.3 8.7 9.9V32H16v2h8v-2h-2.7v-2.1c4.9-.6 8.7-4.8 8.7-9.9v-2h-2z" fill="white" opacity="0.8"/>
          </svg>
        </div>
        <h1 class="logo-title">AI Meeting Assistant</h1>
        <p class="logo-subtitle">Real-time transcription & diarization</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="register">Create Account</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form active">
        <div class="input-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">
          <span class="btn-text">Sign In</span>
          <div class="btn-spinner"></div>
        </button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form">
        <div class="input-group">
          <label for="register-name">Name</label>
          <input type="text" id="register-name" placeholder="Your name" required>
        </div>
        <div class="input-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" placeholder="Min 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" id="register-btn">
          <span class="btn-text">Create Account</span>
          <div class="btn-spinner"></div>
        </button>
      </form>

      <div id="auth-error" class="error-message"></div>
    </div>

    <!-- ── Main View ──────────────────────────────────────────────────────── -->
    <div id="main-view" class="view">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <div class="user-avatar" id="user-avatar">U</div>
          <div class="header-info">
            <span class="user-name" id="user-name">User</span>
            <span class="connection-status" id="connection-status">
              <span class="status-dot"></span>
              Connected
            </span>
          </div>
        </div>
        <button class="btn-icon" id="logout-btn" title="Sign Out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

      <!-- Meeting Info -->
      <div class="meeting-info" id="meeting-info">
        <div class="meeting-platform" id="meeting-platform">
          <span class="platform-icon">🌐</span>
          <span class="platform-name">No meeting detected</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="meeting-title-input">
          <input type="text" id="meeting-title" placeholder="Meeting title (optional)" value="">
        </div>

        <button class="record-btn" id="record-btn">
          <div class="record-btn-inner">
            <div class="record-icon" id="record-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <circle cx="12" cy="12" r="8"/>
              </svg>
            </div>
          </div>
          <span class="record-label" id="record-label">Start Recording</span>
        </button>

        <div class="recording-timer" id="recording-timer" style="display: none;">
          <span class="timer-dot"></span>
          <span class="timer-text" id="timer-text">00:00</span>
        </div>
      </div>

      <!-- Live Transcript -->
      <div class="transcript-section" id="transcript-section" style="display: none;">
        <div class="section-header">
          <h3>Live Transcript</h3>
          <span class="segment-count" id="segment-count">0 segments</span>
        </div>
        <div class="transcript-feed" id="transcript-feed">
          <div class="transcript-empty">
            <p>Waiting for speech...</p>
          </div>
        </div>
      </div>

      <!-- Status Bar -->
      <div class="status-bar" id="status-bar" style="display: none;">
        <div class="status-progress">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <span class="status-text" id="status-text">Processing...</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
